<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}F5 XC Dashboard{% endblock %}</title>
  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    /* ------------------------------------------------------------------ */
    /* Top navigation bar                                                   */
    /* ------------------------------------------------------------------ */
    .navbar {
      background: linear-gradient(135deg, #cc2222 0%, #e63946 100%);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 56px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-brand {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-right: 40px;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .navbar-brand svg {
      width: 24px;
      height: 24px;
      fill: #fff;
      flex-shrink: 0;
    }

    .navbar-nav {
      display: flex;
      list-style: none;
      gap: 4px;
      flex: 1;
    }

    .navbar-nav a {
      padding: 6px 14px;
      border-radius: 6px;
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .navbar-nav a:hover,
    .navbar-nav a.active {
      background: rgba(255,255,255,0.2);
      color: #fff;
    }

    /* ------------------------------------------------------------------ */
    /* Main content                                                         */
    /* ------------------------------------------------------------------ */
    .container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .page-header p {
      color: #666;
      margin-top: 4px;
      font-size: 13px;
    }

    /* ------------------------------------------------------------------ */
    /* Alert / error banner                                                 */
    /* ------------------------------------------------------------------ */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.5;
    }

    .alert-danger {
      background: #fff0f0;
      border: 1px solid #ffc9c9;
      color: #c0392b;
    }

    .alert-success {
      background: #f0fff4;
      border: 1px solid #b2f2c9;
      color: #1a6b3a;
    }

    /* ------------------------------------------------------------------ */
    /* Card                                                                 */
    /* ------------------------------------------------------------------ */
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid #eef0f3;
      font-weight: 600;
      font-size: 13px;
      color: #444;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ------------------------------------------------------------------ */
    /* Tables                                                               */
    /* ------------------------------------------------------------------ */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: #f8f9fb;
    }

    th {
      padding: 10px 16px;
      text-align: left;
      font-weight: 600;
      color: #555;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      white-space: nowrap;
      border-bottom: 1px solid #eef0f3;
    }

    td {
      padding: 10px 16px;
      border-bottom: 1px solid #f2f3f5;
      color: #333;
    }

    tbody tr:last-child td { border-bottom: none; }

    tbody tr:hover { background: #f9fafc; }

    /* ------------------------------------------------------------------ */
    /* Progress bar                                                         */
    /* ------------------------------------------------------------------ */
    .progress-bar-wrap {
      background: #edf0f5;
      border-radius: 999px;
      height: 8px;
      width: 120px;
      overflow: hidden;
      display: inline-block;
      vertical-align: middle;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.3s;
    }

    .pct-label {
      display: inline-block;
      margin-left: 8px;
      font-size: 12px;
      color: #888;
      min-width: 40px;
    }

    /* Bar fill colour is set dynamically by JS (pctToColor) */

    /* ------------------------------------------------------------------ */
    /* Badge / pill                                                         */
    /* ------------------------------------------------------------------ */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-neutral { background: #edf0f5; color: #555; }
    .badge-ok      { background: #d4f5e2; color: #1a6b3a; }
    .badge-warn    { background: #fff3cd; color: #856404; }
    .badge-crit    { background: #ffe3e3; color: #c0392b; }

    /* ------------------------------------------------------------------ */
    /* Forms                                                               */
    /* ------------------------------------------------------------------ */
    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
      color: #333;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      max-width: 480px;
      padding: 9px 12px;
      border: 1px solid #d0d5dd;
      border-radius: 7px;
      font-size: 13px;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      border-color: #cc2222;
      box-shadow: 0 0 0 3px rgba(204,34,34,0.12);
    }

    .form-hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #cc2222;
      color: #fff;
    }

    .btn-primary:hover { background: #b01c1c; }

    .btn-secondary {
      background: #edf0f5;
      color: #444;
    }

    .btn-secondary:hover { background: #e0e4ec; }

    /* ------------------------------------------------------------------ */
    /* Namespace selector row                                               */
    /* ------------------------------------------------------------------ */
    .ns-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ns-selector select { max-width: 320px; }

    /* ------------------------------------------------------------------ */
    /* Stat card row                                                        */
    /* ------------------------------------------------------------------ */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #fff;
      border-radius: 10px;
      padding: 18px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .stat-card .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .stat-card .sub {
      font-size: 12px;
      color: #aaa;
      margin-top: 2px;
    }

    /* ------------------------------------------------------------------ */
    /* Empty state                                                          */
    /* ------------------------------------------------------------------ */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #aaa;
    }

    .empty-state p { margin-top: 8px; font-size: 13px; }
  </style>
</head>
<body>

<nav class="navbar">
  <span class="navbar-brand">
    <!-- F5 stylised shield icon -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M12 2L3 6v6c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V6L12 2zm0 3.5l7 3.15V12c0 4.2-2.9 8.12-7 9.32C7.9 20.12 5 16.2 5 12V8.65L12 5.5z"/>
    </svg>
    F5 XC Dashboard
  </span>

  <ul class="navbar-nav">
    <li>
      <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>
        <!-- chart icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2zm-7 14H7v-2h5v2zm5-4H7v-2h10v2zm0-4H7V7h10v2z"/>
        </svg>
        Quota
      </a>
    </li>
    <li>
      <a href="/namespaces" {% if request.url.path.startswith("/namespaces") %}class="active"{% endif %}>
        <!-- folder icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V8a2 2 0 00-2-2h-8l-2-2z"/>
        </svg>
        Namespaces
      </a>
    </li>
    <li>
      <a href="/top-consumers" {% if request.url.path.startswith("/top-consumers") %}class="active"{% endif %}>
        <!-- trophy icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V18H9v2h6v-2h-2v-2.1a5.01 5.01 0 003.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.86 10.4 5 9.3 5 8zm14 0c0 1.3-.86 2.4-2 2.82V7h2v1z"/>
        </svg>
        Top Consumers
      </a>
    </li>
    <li>
      <a href="/settings" {% if request.url.path.startswith("/settings") %}class="active"{% endif %}>
        <!-- gear icon -->
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.01 7.01 0 00-1.62-.94l-.36-2.54A.484.484 0 0014 2h-4a.485.485 0 00-.48.41l-.36 2.54a7.01 7.01 0 00-1.62.94l-2.39-.96a.477.477 0 00-.59.22L2.74 8.87a.47.47 0 00.12.61l2.03 1.58c-.04.3-.06.62-.06.94s.02.64.06.94l-2.03 1.58a.47.47 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.36 1.04.67 1.62.94l.36 2.54c.05.24.27.41.48.41h4c.22 0 .43-.17.47-.41l.36-2.54a7.01 7.01 0 001.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 00-.12-.61l-2.03-1.58zM12 15.6a3.6 3.6 0 110-7.2 3.6 3.6 0 010 7.2z"/>
        </svg>
        Settings
      </a>
    </li>
  </ul>
</nav>

<main class="container">
  {% block content %}{% endblock %}
</main>

</body>
</html>
